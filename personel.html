<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSKİ Yönetim Paneli</title>

    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { margin: 0; font-family: 'Onest', sans-serif; background: #f4f7f6; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Üst Menü (Navbar) */
        .navbar { background: linear-gradient(135deg, #063d75 0%, #0a5cb8 100%); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px rgba(6, 61, 117, 0.15); z-index: 10; }
        .navbar h2 { margin: 0; font-family: 'Sora', sans-serif; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .btn-exit { background: rgba(255, 255, 255, 0.15); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: 600; transition: background 0.3s; }
        .btn-exit:hover { background: rgba(255, 255, 255, 0.25); }
        .nav-right {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .user-info {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 3px;
        font-size: 0.82rem;
    }

    .user-name {
        font-weight: 700;
        color: #ffffff;
    }

    .user-role {
        color: #d7ecff;
        font-size: 0.75rem;
    }

        /* Ana Düzen (Yan Menü + Sohbet Alanı) */
        .dashboard { display: flex; flex: 1; overflow: hidden; }
        
        /* Sol Menü: Vatandaş Listesi */
        .sidebar { width: 320px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-weight: 700; color: #0b1f38; }
        .filter-panel {
            display: none;
            padding: 12px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }

        .filter-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 8px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }

        .filter-btn {
            border: 1px solid #dbeafe;
            background: #f8fafc;
            color: #063d75;
            padding: 6px 9px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #eef5fc;
        }

        .filter-btn.active {
            background: #0a5cb8;
            color: white;
            border-color: #0a5cb8;
        }
        .session-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .session-item { padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.2s; }
        .session-item:hover { background: #f0f5fb; }
        .session-item.active { background: #eef5fc; border-left: 4px solid #17b3c9; }
        .session-id-text { font-weight: 600; color: #063d75; font-size: 0.9rem; word-break: break-all; }
        .session-date { font-size: 0.75rem; color: #64748b; margin-top: 5px; }
        .session-unit {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        margin-top: 8px;
        padding: 5px 9px;
        border-radius: 999px;
        background: #eef5fc;
        color: #063d75;
        font-size: 0.72rem;
        font-weight: 700;
        border: 1px solid rgba(10, 92, 184, 0.12);
       }
       .session-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    padding: 5px 9px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 700;
}

    .status-yeni {
        background: #ecfdf5;
        color: #047857;
        border: 1px solid #bbf7d0;
    }

    .status-inceleniyor {
        background: #fff7ed;
        color: #c2410c;
        border: 1px solid #fed7aa;
    }

    .status-tamamlandi {
        background: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #bfdbfe;
    }

        /* Sağ Taraf: Sohbet Geçmişi */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f4f7f6; }
        .chat-header { padding: 15px 25px; background: white; border-bottom: 1px solid #e2e8f0; color: #0b1f38; font-weight: 600; display: flex; justify-content: space-between; }
        .status-actions {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .btn-status-change {
        border: 1px solid #dbeafe;
        background: #f8fafc;
        color: #063d75;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-status-change:hover {
        background: #0a5cb8;
        color: white;
        border-color: #0a5cb8;
    }
            .chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
            .note-panel {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 25px;
            display: none;
        }

        .note-title {
            font-weight: 700;
            color: #0b1f38;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .note-area {
            width: 100%;
            min-height: 70px;
            resize: vertical;
            border: 1px solid #dbeafe;
            border-radius: 12px;
            padding: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        .note-area:focus {
            border-color: #0a5cb8;
            box-shadow: 0 0 0 3px rgba(10, 92, 184, 0.1);
        }

        .note-actions {
            margin-top: 8px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-note-save {
            background: #0a5cb8;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-note-save:hover {
            background: #063d75;
        }
        
        /* Mesaj Balonları */
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; position: relative; }
        .msg.Vatandaş { align-self: flex-start; background: white; color: #0b1f38; border-bottom-left-radius: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .msg.Bot { align-self: flex-end; background: #eef5fc; color: #063d75; border-bottom-right-radius: 4px; box-shadow: 0 4px 6px -1px rgba(10, 92, 184, 0.1); border: 1px solid rgba(10, 92, 184, 0.1); }
        .msg-time { display: block; font-size: 0.7rem; margin-top: 6px; opacity: 0.7; text-align: right; }

        /* Hoşgeldin Ekranı (Seçim yapılmadan önce) */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #94a3b8; }
        .empty-state i { font-size: 4rem; margin-bottom: 15px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="navbar">
    <h2><i class="bi bi-shield-check"></i> KOSKİ Yönetim Paneli</h2>

    <div class="nav-right">
        <div class="user-info">
            <span class="user-name" id="personelAdSoyad">Personel</span>
            <span class="user-role" id="personelRolBirim">Yetki | Birim</span>
        </div>

        <a href="#" onclick="cikisYap()" class="btn-exit">
            <i class="bi bi-box-arrow-left"></i> Çıkış Yap
        </a>
    </div>
</div>

<div class="dashboard">
    <div class="sidebar">
        <div class="sidebar-header">
    <i class="bi bi-people-fill"></i> Aktif Vatandaş Görüşmeleri
</div>

<div class="filter-panel" id="filterPanel">
    <div class="filter-title">
        <i class="bi bi-funnel-fill"></i> Birime Göre Filtrele
    </div>

    <div class="filter-buttons">
        <button class="filter-btn active" data-birim="tum">Tümü</button>
        <button class="filter-btn" data-birim="1">Abonelik</button>
        <button class="filter-btn" data-birim="2">Sayaç</button>
        <button class="filter-btn" data-birim="3">Fatura</button>
        <button class="filter-btn" data-birim="4">Su Kayıpları</button>
        <button class="filter-btn" data-birim="5">Şebeke Bakım</button>
        <button class="filter-btn" data-birim="6">Su Temin</button>
        <button class="filter-btn" data-birim="7">Plan Proje</button>
        <button class="filter-btn" data-birim="8">Müşteri Hizmetleri</button>
    </div>
</div>

<ul class="session-list" id="sessionList">
            <li style="padding: 15px; text-align: center; color: #64748b;">Yükleniyor...</li>
        </ul>
    </div>

   <div class="chat-area">
    <div class="chat-header" id="chatHeader">
        <span>Seçili Görüşme Yok</span>
    </div>

    <div class="note-panel" id="notePanel">
        <div class="note-title">
            <i class="bi bi-journal-text"></i> Personel Notu
        </div>

        <textarea 
            class="note-area" 
            id="personelNotu" 
            placeholder="Bu görüşme ile ilgili kurum içi not yazın..."></textarea>

        <div class="note-actions">
            <button class="btn-note-save" onclick="personelNotuKaydet()">
                <i class="bi bi-save"></i> Notu Kaydet
            </button>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
            <div class="empty-state">
                <i class="bi bi-chat-square-text"></i>
                <p>Geçmiş mesajları görmek için sol taraftan bir sohbet seçin.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // GÜVENLİK KONTROLÜ: Eğer yetki yoksa, zorla giriş sayfasına at!
if (localStorage.getItem("personel_yetki") !== "tamam") {
    window.location.href = "personel-giris.html";
}
    const API_BASE = "http://localhost:8000/api/personel";
    let aktifFiltreBirimId = "tum";
    let aktifSessionId = null;
    const birimAdlari = {
        "1": "Abonelik İşlemleri",
        "2": "Sayaç İşlemleri",
        "3": "Fatura ve Ödeme İşlemleri",
        "4": "Su Kayıpları Kontrolü",
        "5": "Su Şebeke Bakım Onarım",
        "6": "Su Temin ve Kaynak Geliştirme",
        "7": "Plan Proje",
        "8": "Müşteri Hizmetleri"
    };

    function personelBilgisiniGoster() {
        const adSoyad = localStorage.getItem("ad_soyad") || "Personel";
        const yetki = localStorage.getItem("yetki_seviyesi") || "Standart";
        const birimId = localStorage.getItem("birim_id");
        const birimAdi = birimAdlari[birimId] || "Birim Bilgisi Yok";

        document.getElementById("personelAdSoyad").textContent = adSoyad;
        document.getElementById("personelRolBirim").textContent = `${yetki} | ${birimAdi}`;
    }
    function filtreleriHazirla() {
    const yetki = localStorage.getItem("yetki_seviyesi");
    const filterPanel = document.getElementById("filterPanel");

    // Filtreler sadece yönetici için görünür.
    if (yetki !== "Yönetici") {
        filterPanel.style.display = "none";
        return;
    }

    filterPanel.style.display = "block";

    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", function () {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            this.classList.add("active");

            aktifFiltreBirimId = this.getAttribute("data-birim");

            // Filtre değişince sohbet listesi yeniden yüklenir.
            oturumlariYukle();
        });
    });
}

    function cikisYap() {
        localStorage.removeItem("personel_yetki");
        localStorage.removeItem("ad_soyad");
        localStorage.removeItem("yetki_seviyesi");
        localStorage.removeItem("birim_id");

        window.location.href = "giris.html";
    }
    function durumSinifiGetir(durum) {
    if (durum === "İnceleniyor") {
        return "status-inceleniyor";
    }

    if (durum === "Tamamlandı") {
        return "status-tamamlandi";
    }

    return "status-yeni";
}
async function durumGuncelle(sessionId, yeniDurum) {
    try {
        const response = await fetch(`${API_BASE}/oturumlar/${sessionId}/durum`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ durum: yeniDurum })
        });

        const data = await response.json();

        if (data.durum === true) {
            // Sol listedeki durum bilgisini yenile
            await oturumlariYukle();

            // Açık olan görüşmenin üst bilgisini de güncelle
            mesajlariYukle(sessionId, yeniDurum);
        } else {
            alert(data.mesaj || "Durum güncellenemedi.");
        }

    } catch (error) {
        console.error("Durum güncellenirken hata oluştu:", error);
        alert("Sunucuya bağlanılamadı. Durum güncellenemedi.");
    }
}

async function personelNotuKaydet() {
    if (!aktifSessionId) {
        alert("Önce bir görüşme seçmelisiniz.");
        return;
    }

    const notMetni = document.getElementById("personelNotu").value;

    try {
        const response = await fetch(`${API_BASE}/oturumlar/${aktifSessionId}/not`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ personel_notu: notMetni })
        });

        const data = await response.json();

        if (data.durum === true) {
            alert("Personel notu kaydedildi.");
            await oturumlariYukle();
        } else {
            alert(data.mesaj || "Not kaydedilemedi.");
        }

    } catch (error) {
        console.error("Not kaydedilirken hata oluştu:", error);
        alert("Sunucuya bağlanılamadı. Not kaydedilemedi.");
    }
}

    // Sayfa açıldığında oturumları (vatandaşları) getir
    async function oturumlariYukle() {
        // Hafızadan mühürlediğimiz bilgileri geri çağır
    const bId = localStorage.getItem("birim_id");
    const yetki = localStorage.getItem("yetki_seviyesi");
    
    // API'ye bu bilgileri parametre olarak fırlat
    let url = `${API_BASE}/oturumlar?birim_id=${bId}&yetki_seviyesi=${yetki}`;

    if (yetki === "Yönetici") {
        url += `&filtre_birim_id=${aktifFiltreBirimId}`;
    }
        try {
            const response = await fetch(url);
            const data = await response.json();
            const listEl = document.getElementById("sessionList");
            listEl.innerHTML = ""; // Yükleniyor yazısını temizle

            if (data.oturumlar.length === 0) {
                listEl.innerHTML = '<li style="padding: 15px; text-align: center; color: #64748b;">Kayıtlı sohbet bulunamadı.</li>';
                return;
            }

            data.oturumlar.forEach(oturum => {
                const li = document.createElement("li");
                li.className = "session-item";
                
                // Tarihi daha okunaklı yap
                const tarih = new Date(oturum.tarih).toLocaleString('tr-TR');

                li.innerHTML = `
            <div class="session-id-text">
                <i class="bi bi-person"></i> ${oturum.session_id.substring(0, 15)}...
            </div>

            <div class="session-unit">
                <i class="bi bi-diagram-3"></i> ${oturum.birim_adi || "Birim Atanmadı"}
            </div>

            <div class="session-status ${durumSinifiGetir(oturum.durum)}">
                <i class="bi bi-circle-fill"></i> ${oturum.durum || "Yeni"}
            </div>

            <div class="session-date">
                <i class="bi bi-clock"></i> ${tarih}
            </div>
           `;
                
                // Tıklandığında mesajları getir
                li.onclick = () => {
                    // Aktif sınıfını güncelle
                    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                   aktifSessionId = oturum.session_id;
                    document.getElementById("notePanel").style.display = "block";
                    document.getElementById("personelNotu").value = oturum.personel_notu || "";
                    mesajlariYukle(oturum.session_id, oturum.durum);
                };
                listEl.appendChild(li);
            });
        } catch (error) {
            console.error("Oturumlar çekilirken hata:", error);
            document.getElementById("sessionList").innerHTML = '<li style="color: red; padding: 15px;">Bağlantı hatası! Sunucu açık mı?</li>';
        }
    }

    // Seçilen oturumun mesaj geçmişini getir
    async function mesajlariYukle(sessionId, mevcutDurum = "Yeni") {
        const chatBox = document.getElementById("chatBox");
        const chatHeader = document.getElementById("chatHeader");
        
        chatHeader.innerHTML = `
    <span>
        <i class="bi bi-record-circle-fill text-success" style="color: #4ade80;"></i>
        Görüntülenen: <b>${sessionId}</b>
    </span>

    <div class="status-actions">
        <button class="btn-status-change" onclick="durumGuncelle('${sessionId}', 'Yeni')">Yeni</button>
        <button class="btn-status-change" onclick="durumGuncelle('${sessionId}', 'İnceleniyor')">İnceleniyor</button>
        <button class="btn-status-change" onclick="durumGuncelle('${sessionId}', 'Tamamlandı')">Tamamlandı</button>
    </div>
`;
        chatBox.innerHTML = '<div style="text-align:center; padding:20px; color:#64748b;">Mesajlar yükleniyor...</div>';

        try {
            const response = await fetch(`${API_BASE}/mesajlar/${sessionId}`);
            const data = await response.json();
            
            chatBox.innerHTML = ""; // Temizle
            
            data.mesajlar.forEach(m => {
                const div = document.createElement("div");
                div.className = `msg ${m.gonderen}`;
                
                // Tarihi formatla
                const saat = new Date(m.zaman).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

                div.innerHTML = `
                    <b>${m.gonderen}</b><br>
                    ${m.mesaj}
                    <span class="msg-time">${saat}</span>
                `;
                chatBox.appendChild(div);
            });

            // En alta kaydır
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (error) {
            console.error("Mesajlar çekilirken hata:", error);
            chatBox.innerHTML = '<div style="color: red; padding: 20px;">Mesajlar yüklenemedi.</div>';
        }
    }

         // İlk açılışta personel bilgisini ve oturumları getir
        personelBilgisiniGoster();
        filtreleriHazirla();
        oturumlariYukle();
</script>

</body>
</html>
