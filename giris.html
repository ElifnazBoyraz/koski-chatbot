<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSKİ Destek Portalı</title>

    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { 
            background-color: #f4f7f6; 
            font-family: 'Onest', sans-serif; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #eef5fc, #f4f7f6);
        }
        .portal-container {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(6, 61, 117, 0.1), 0 0 0 1px rgba(6, 61, 117, 0.05);
            text-align: center;
            animation: kpop 0.5s cubic-bezier(0.34, 1.4, 0.5, 1) both;
        }
        @keyframes kpop {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #063d75 0%, #0a5cb8 55%, #17b3c9 120%);
            color: white;
            border-radius: 20px;
            display: inline-grid;
            place-items: center;
            font-size: 2rem;
            margin-bottom: 24px;
            box-shadow: 0 12px 24px -8px rgba(10, 92, 184, 0.5);
        }
        h1 {
            color: #0b1f38;
            font-size: 1.5rem;
            font-family: 'Sora', sans-serif;
            margin: 0 0 10px;
        }
        p {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 35px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .btn-citizen {
            background: linear-gradient(140deg, #0a5cb8, #17b3c9);
            color: #ffffff;
            box-shadow: 0 10px 20px -8px rgba(10, 92, 184, 0.4);
        }
        .btn-citizen:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -8px rgba(10, 92, 184, 0.6);
        }
        .btn-staff {
            background: #f8fafc;
            color: #063d75;
            border: 2px solid #e2e8f0;
        }
        .btn-staff:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
            transform: translateY(-3px);
        }
        .btn i {
            font-size: 1.2rem;
        }
        .footer-note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="portal-container">
    <div class="logo-icon">
        <i class="bi bi-droplet-half"></i>
    </div>
    <h1>KOSKİ Destek Portalı</h1>
    <p>Konya Su ve Kanalizasyon İdaresi dijital destek sistemine hoş geldiniz. Lütfen giriş yapmak istediğiniz modülü seçin.</p>
    
    <div class="btn-group">
        <a href="index.html" class="btn btn-citizen">
            <i class="bi bi-person-heart"></i>
            Vatandaş Girişi (Chatbot)
        </a>
        
        <a href="personel-giris.html" class="btn btn-staff">
            <i class="bi bi-shield-lock-fill"></i>
            Personel Girişi (Yönetim)
        </a>
    </div>

    <div class="footer-note">
        KOSKİ Genel Müdürlüğü © 2026
    </div>
</div>

</body>
</html>
