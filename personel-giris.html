<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSKİ Personel Girişi</title>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Onest', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(6, 61, 117, 0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-card i.logo { font-size: 3rem; color: #0a5cb8; margin-bottom: 10px; }
        .login-card h2 { margin: 0 0 20px; color: #0b1f38; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; color: #64748b; margin-bottom: 5px; font-weight: 600; }
        .input-group input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none; }
        .input-group input:focus { border-color: #17b3c9; box-shadow: 0 0 0 3px rgba(23, 179, 201, 0.1); }
        .btn-login { background: linear-gradient(135deg, #063d75, #0a5cb8); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(10, 92, 184, 0.4); }
        #hataMesaji { color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <i class="bi bi-shield-lock logo"></i>
    <h2>Personel Girişi</h2>
    
    <form id="loginForm">
        <div class="input-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="kullanici" required autocomplete="off">
        </div>
        <div class="input-group">
            <label>Şifre</label>
            <input type="password" id="sifre" required>
        </div>
        <button type="submit" class="btn-login">Giriş Yap</button>
        <div id="hataMesaji">Kullanıcı adı veya şifre hatalı!</div>
    </form>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const k_adi = document.getElementById("kullanici").value;
        const sifre = document.getElementById("sifre").value;
        const hata = document.getElementById("hataMesaji");

        try {
            const response = await fetch("http://localhost:8000/api/personel/giris", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ kullanici_adi: k_adi, sifre: sifre })
            });
            const data = await response.json();

            if(data.durum === true) {
                // Giriş başarılıysa tarayıcıya "Bu kişi yetkili" damgası vur
                localStorage.setItem("personel_yetki", "tamam");

                localStorage.setItem("ad_soyad", data.ad_soyad);
                localStorage.setItem("yetki_seviyesi", data.yetki_seviyesi);
                localStorage.setItem("birim_id", data.birim_id);

                window.location.href = "personel.html";
            } else {
                hata.style.display = "block"; // Hata mesajını göster
            }
        } catch (error) {
            hata.textContent = "Sunucuya bağlanılamadı!";
            hata.style.display = "block";
        }
    });
</script>

</body>
</html>
